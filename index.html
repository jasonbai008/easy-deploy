<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Deploy - Cloudflare R2</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- 使用 unpkg 引入 Vue 2 -->
    <script src="https://unpkg.com/vue@2.7.16/dist/vue.js"></script>
    <style>
        :root {
            --cf-orange: #F6821F;
            --cf-orange-hover: #e67300;
            --cf-bg: #f9f9f9;
            --border-color: #e0e0e0;
            --text-main: #333;
            --text-secondary: #666;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--cf-bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        [v-cloak] { display: none; }

        #app {
            display: flex;
            height: 100%;
        }

        /* 左侧区域样式 */
        .sidebar {
            width: 380px;
            background-color: var(--white);
            border-right: 1px solid var(--border-color);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .header {
            margin-bottom: 40px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .step-section {
            margin-bottom: 24px;
        }

        .step-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--cf-orange);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-text {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-text:focus {
            border-color: var(--cf-orange);
            box-shadow: 0 0 0 3px rgba(246, 130, 31, 0.1);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .upload-btn {
            background: none;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            border-color: var(--cf-orange);
            background-color: #fffaf5;
        }

        .upload-btn svg {
            width: 24px;
            height: 24px;
            color: #999;
        }

        .upload-btn span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 24px;
            background: #fcfcfc;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            padding: 12px;
        }

        .file-list-title {
            font-size: 11px;
            font-weight: 700;
            color: #bbb;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #f5f5f5;
        }

        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .file-size {
            color: #aaa;
        }

        .deploy-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--cf-orange);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(246, 130, 31, 0.2);
        }

        .deploy-btn:hover:not(:disabled) {
            background-color: var(--cf-orange-hover);
        }

        .deploy-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .deploy-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .preview-link-section {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .link-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #fffaf5;
            padding: 12px;
            border: 1px solid #ffe8d1;
            border-radius: 6px;
        }

        .link-input {
            background: none;
            border: none;
            font-size: 12px;
            color: #c46210;
            width: 100%;
            outline: none;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--cf-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
        }

        .icon-btn:hover {
            background-color: rgba(246, 130, 31, 0.1);
        }

        /* 右侧预览区域样式 */
        .preview-area {
            flex: 1;
            background-color: #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        .browser-bar {
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px; /* 增加高度 */
            display: flex;
            align-items: center;
            gap: 16px;
            height: 60px; /* 显式设置更高的高度 */
        }

        .browser-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background-color: #ff5f57; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #28c940; }

        .address-bar {
            flex: 1;
            background-color: #f3f4f6;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .external-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background-color: var(--cf-orange);
            border: 1px solid var(--cf-orange);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .external-btn:hover {
            background-color: var(--cf-orange-hover);
            border-color: var(--cf-orange-hover);
            color: white;
            box-shadow: 0 2px 4px rgba(246, 130, 31, 0.2);
        }

        .external-btn.secondary {
            background-color: white;
            color: var(--cf-orange);
            border: 1px solid var(--cf-orange);
        }

        .external-btn.secondary:hover {
            background-color: rgba(246, 130, 31, 0.05);
            color: var(--cf-orange-hover);
        }

        .iframe-container {
            flex: 1;
            background-color: var(--white);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-preview {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccc;
            gap: 16px;
        }

        .empty-preview svg {
            width: 80px;
            height: 80px;
            opacity: 0.2;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <!-- 左侧上传区域 -->
        <div class="sidebar">
            <div class="header">
                <div class="logo-container">
                    <img src="favicon.png" alt="Logo" class="logo-img">
                    <span class="title">Easy Deploy</span>
                </div>
                <p class="subtitle">快速部署您的静态页面到 Cloudflare R2</p>
            </div>

            <!-- Step 1: 项目名称 -->
            <div class="step-section">
                <label class="step-label">Step 1: 输入项目名称</label>
                <input v-model="projectName" type="text" placeholder="例如: my-awesome-app" class="input-text">
            </div>

            <!-- Step 2: 上传按钮 -->
            <div class="step-section">
                <label class="step-label">Step 2: 上传 HTML 或文件夹</label>
                <div class="upload-grid">
                    <button @click="$refs.fileInput.click()" class="upload-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <span>上传HTML</span>
                    </button>
                    <button @click="$refs.folderInput.click()" class="upload-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        <span>上传文件夹</span>
                    </button>
                </div>
                <!-- 隐藏的 input -->
                <input type="file" ref="fileInput" class="hidden" @change="handleFiles" accept=".html">
                <input type="file" ref="folderInput" class="hidden" webkitdirectory @change="handleFiles">
            </div>

            <!-- 待上传列表 -->
            <div v-if="files.length > 0" class="file-list">
                <div class="file-list-title">待上传文件 ({{ files.length }})</div>
                <div class="file-item" v-for="(file, index) in files.slice(0, 8)" :key="index">
                    <span class="file-name">{{ file.webkitRelativePath || file.name }}</span>
                    <span class="file-size">{{ (file.size / 1024).toFixed(1) }} KB</span>
                </div>
                <div v-if="files.length > 8" style="text-align: center; font-size: 11px; color: #aaa; margin-top: 8px; font-style: italic;">
                    ... 以及另外 {{ files.length - 8 }} 个文件
                </div>
            </div>

            <!-- 部署按钮 -->
            <button @click="deploy" :disabled="isUploading || !projectName || files.length === 0" class="deploy-btn">
                <span v-if="isUploading" class="spinner"></span>
                {{ isUploading ? '正在部署...' : '开始部署' }}
            </button>
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-area">
            <div class="browser-bar">
                <div class="browser-dots">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div class="address-bar">
                    {{ previewUrl || '等待部署...' }}
                </div>
                <div v-if="previewUrl" style="display: flex; gap: 8px;">
                    <button @click="copyLink" class="external-btn secondary">
                        <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        <span>复制</span>
                    </button>
                    <a :href="previewUrl" target="_blank" class="external-btn">
                        <span>打开</span>
                        <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>
            </div>
            <div class="iframe-container">
                <iframe v-if="previewUrl" :src="previewUrl"></iframe>
                <div v-else class="empty-preview">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    <p>部署完成后在此处预览</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                projectName: '',
                files: [],
                isUploading: false,
                uploadProgress: 0,
                previewUrl: ''
            },
            methods: {
                /**
                 * 处理文件选择
                 * @param {Event} event 
                 */
                handleFiles(event) {
                    const selectedFiles = Array.from(event.target.files);
                    if (selectedFiles.length > 0) {
                        this.files = selectedFiles;
                        this.previewUrl = ''; 
                    }
                },
                
                /**
                 * 部署到 R2 (使用 fetch API)
                 */
                async deploy() {
                    if (!this.projectName || this.files.length === 0) return;
                    
                    this.isUploading = true;
                    this.uploadProgress = 0;
                    
                    try {
                        const formData = new FormData();
                        formData.append('projectName', this.projectName);
                        
                        this.files.forEach(file => {
                            let path = file.name;
                            // 如果是文件夹上传，剥离第一层文件夹名
                            if (file.webkitRelativePath) {
                                const parts = file.webkitRelativePath.split('/');
                                if (parts.length > 1) {
                                    path = parts.slice(1).join('/');
                                } else {
                                    path = file.webkitRelativePath;
                                }
                            }
                            formData.append('files', file, path);
                        });

                        const response = await fetch('/upload', {
                            method: 'POST',
                            body: formData
                        });

                        const result = await response.json();

                        if (result.success) {
                            this.uploadProgress = 100;
                            
                            // 查找主页面 (index.html 或唯一的 html 文件)
                            let mainFile = 'index.html';
                            
                            // 优先检查是否存在 index.html (剥离路径后)
                            const hasIndexHtml = this.files.some(file => {
                                let path = file.name;
                                if (file.webkitRelativePath) {
                                    const parts = file.webkitRelativePath.split('/');
                                    path = parts.length > 1 ? parts.slice(1).join('/') : file.webkitRelativePath;
                                }
                                return path === 'index.html';
                            });

                            if (!hasIndexHtml) {
                                const htmlFiles = this.files.filter(f => f.name.endsWith('.html'));
                                if (htmlFiles.length === 1) {
                                    mainFile = htmlFiles[0].name;
                                }
                            }
                            
                            this.previewUrl = `https://asset.jasonbai.dpdns.org/app/${this.projectName}/${mainFile}`;
                            alert('部署成功！');
                            
                            // 部署成功后清除已上传的文件
                            this.files = [];
                        } else {
                            throw new Error(result.message || '上传失败');
                        }
                    } catch (error) {
                        console.error('Upload error:', error);
                        alert('部署出错: ' + error.message);
                    } finally {
                        this.isUploading = false;
                    }
                },

                /**
                 * 复制预览链接
                 */
                copyLink() {
                    navigator.clipboard.writeText(this.previewUrl).then(() => {
                        alert('链接已复制到剪贴板');
                    });
                }
            }
        });
    </script>
</body>
</html>
